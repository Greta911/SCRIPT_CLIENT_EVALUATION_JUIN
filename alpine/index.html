<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta Firstname="viewport" content="width=device-width, initial-scale=1" />
    <title>Contacts App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .contacts-table tbody tr:nth-of-type(even) {
        background: #f9fafb; /* Gray 50 */
      }

      .contacts-table tr:not(.isEditing) .isEditing-visible {
        display: none;
      }
      .contacts-table tr:not(.isEditing) .isEditing_hidden {
        display: block;
      }
      .contacts-table tr.isEditing .isEditing-visible {
        display: block;
      }
      .contacts-table tr.isEditing .isEditing-hidden {
        display: none;
      }
    </style>
  </head>
  <body class="bg-gray-100 container mx-auto py-8">
    <div
      x-data="contactApp()"
      id="app"
      class="w-full bg-white rounded-lg shadow-lg flex flex-wrap overflow-hidden"
    >
      <!-- Aside gauche pour le formulaire -->
      <aside class="w-1/3 bg-gray-200 p-6 pb-12">
        <h2 class="text-xl font-bold mb-4">Add a Contact</h2>
        <div class="mb-4">
          <label class="block text-gray-700">Firstname</label>
          <input
            type="text"
            x-model="newFirstname"
            class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
            placeholder="Alex"
          />
        </div>
        <div class="mb-4">
          <label class="block text-gray-700">Lastname</label>
          <input
            type="text"
            x-model="newLastname"
            class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
            placeholder="Doe"
          />
        </div>
        <div class="mb-4">
          <label class="block text-gray-700">Email</label>
          <input
            type="email"
            x-model="newEmail"
            class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
            placeholder="alex.doe@gmail.com"
          />
        </div>
        <button
          @click="addContact()"
          class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md"
        >
          Add
        </button>
      </aside>

      <!-- Section droite pour la liste des contacts -->
      <section class="w-2/3 p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold mb-4">Contacts List</h2>
          <p class="text-gray-600 mb-4">
            Contacts Count :
            <span x-text="contacts.length" class="font-bold"></span>
          </p>
        </div>

        <!-- Filtre de recherche -->
        <div class="mb-4">
          <input
            type="text"
            x-model="search"
            class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
            placeholder="Search a contact"
          />
        </div>

        <!-- Liste des contacts triée et filtrée -->
        <table class="table-auto w-full contacts-table">
          <thead>
            <tr class="bg-gray-200">
              <th class="text-left p-4 rounded-tl-lg">
                <a href="#">Firstname</a>
              </th>
              <th class="text-left p-4"><a href="#">Lastname</a></th>
              <th class="text-left p-4">
                <a href="#">Email</a>
              </th>
              <th class="text-right p-4 rounded-tr-lg">Actions</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="item in filteredContacts()" :key="item.id">
              <tr
                class="contact-row"
                :class="item.isEditing ? 'bg-gray-100' : ''"
              >
                <td class="p-4">
                  <span x-show="!item.isEditing" x-text="item.firstname"></span>
                  <input
                    x-show="item.isEditing"
                    type="text"
                    class="w-full px-2 py-1 border rounded"
                    x-model="item.firstname"
                  />
                </td>
                <td class="p-4">
                  <span x-show="!item.isEditing" x-text="item.lastname"></span>
                  <input
                    x-show="item.isEditing"
                    type="text"
                    class="w-full px-2 py-1 border rounded"
                    x-model="item.lastname"
                  />
                </td>
                <td class="p-4">
                  <span x-show="!item.isEditing" x-text="item.email"></span>
                  <input
                    x-show="item.isEditing"
                    type="text"
                    class="w-full px-2 py-1 border rounded"
                    x-model="item.email"
                  />
                </td>
                <td class="p-4">
                  <div class="flex justify-end space-x-2">
                    <button
                      x-show="!item.isEditing"
                      @click="item.isEditing = true; saveToStorage()"
                      class="bg-yellow-400 hover:bg-yellow-500 text-white py-1 px-3 rounded text-sm"
                    >
                      <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button
                      x-show="!item.isEditing"
                      @click="deleteContact(item.id)"
                      class="bg-red-500 hover:bg-red-700 text-white py-1 px-3 rounded text-sm"
                    >
                      <i class="fa-solid fa-trash"></i>
                    </button>
                    <button
                      x-show="item.isEditing"
                      @click="item.isEditing = false; saveToStorage()"
                      class="bg-green-500 hover:bg-green-700 text-white py-1 px-3 rounded text-sm"
                    >
                      <i class="fa-solid fa-check"></i>
                    </button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </section>

      <footer class="w-full bg-gray-500 text-white text-xs p-2">
        &copy; EAFC 2025 Contacts App. All rights reserved.
      </footer>
    </div>
    <script src="//unpkg.com/alpinejs" defer></script>
    <script src="app.js"></script>
  </body>
</html>
